<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportX | Quản lý sản phẩm</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <style>
      .admin-wrap {
        padding-top: 50px;
        padding-bottom: 100px;
      }
      .table-img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 8px;
      }
      .form-label {
        font-weight: 500;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar navbar-expand-lg navbar-dark container py-3">
        <a class="navbar-brand fw-bold fs-3" href="./index.html"
          ><i class="fa-solid fa-basketball me-2"></i>SportX Admin</a
        >
        <div class="ms-auto">
          <a class="btn btn-outline-light rounded-pill px-4" href="./index.html"
            >Xem Website</a
          >
        </div>
      </nav>
    </header>

    <main class="admin-wrap">
      <div class="container">
        <div class="row g-4">
          <!-- Form thêm sản phẩm -->
          <div class="col-lg-4">
            <div class="glass-card p-4">
              <h2 class="h4 mb-4 text-white">Thêm sản phẩm mới</h2>
              <form id="addProductForm">
                <div class="mb-3">
                  <label class="form-label small"
                    >Mã ID (Ví dụ: shirt-05)</label
                  >
                  <input type="text" id="pId" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label class="form-label small">Tên sản phẩm</label>
                  <input type="text" id="pName" class="form-control" required />
                </div>
                <div class="row mb-3">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label small">Loại</label>
                    <select id="pCategory" class="form-select">
                      <option value="Giày">Giày</option>
                      <option value="Quần áo">Quần áo</option>
                      <option value="Quần">Quần</option>
                      <option value="Phụ kiện">Phụ kiện</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small">Thương hiệu</label>
                    <select id="pBrand" class="form-select">
                      <option value="Li-Ning">Li-Ning</option>
                      <option value="361º">361º</option>
                      <option value="adidas">adidas</option>
                      <option value="Khác">Khác</option>
                    </select>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small">Giá bán (VNĐ)</label>
                  <input
                    type="number"
                    id="pPrice"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label small"
                    >Giá gốc (Nếu có giảm giá)</label
                  >
                  <input
                    type="number"
                    id="pOriginalPrice"
                    class="form-control"
                    placeholder="Để trống nếu không giảm giá"
                  />
                </div>
                <div class="row mb-3">
                  <div class="col-6">
                    <label class="form-label small">Giới tính</label>
                    <select id="pGender" class="form-select">
                      <option value="Nam">Nam</option>
                      <option value="Nữ">Nữ</option>
                      <option value="Unisex">Unisex</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label small">Đối tượng</label>
                    <select id="pTarget" class="form-select">
                      <option value="Người lớn">Người lớn</option>
                      <option value="Trẻ em">Trẻ em</option>
                    </select>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small">Link ảnh (URL)</label>
                  <input
                    type="url"
                    id="pImage"
                    class="form-control"
                    placeholder="https://unsplash.com/..."
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label small">Mô tả ngắn</label>
                  <textarea
                    id="pSummary"
                    class="form-control"
                    rows="2"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label small"
                    >Mô tả chi tiết (Description)</label
                  >
                  <textarea
                    id="pDescription"
                    class="form-control"
                    rows="3"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label small"
                    >Ảnh thư viện (Cách nhau bằng dấu phẩy)</label
                  >
                  <textarea
                    id="pGallery"
                    class="form-control"
                    rows="2"
                    placeholder="url1, url2, url3..."
                  ></textarea>
                </div>
                <div class="row mb-3">
                  <div class="col-6">
                    <label class="form-label small"
                      >Kích cỡ (Ví dụ: S,M,L,XL)</label
                    >
                    <input
                      type="text"
                      id="pSizes"
                      class="form-control"
                      placeholder="S,M,L,XL"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="form-label small">Badge (Nhãn)</label>
                    <input
                      type="text"
                      id="pBadge"
                      class="form-control"
                      placeholder="Mới, Hot, -20%..."
                    />
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn btn-accent w-100 rounded-pill py-2 mt-2"
                >
                  Thêm vào hệ thống
                </button>
              </form>
            </div>
          </div>

          <!-- Danh sách quản lý -->
          <div class="col-lg-8">
            <div class="glass-card p-4">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <h2 class="h4 mb-0 text-white">Danh sách sản phẩm tự thêm</h2>
                <button
                  id="clearAll"
                  class="btn btn-sm btn-outline-danger rounded-pill"
                >
                  Xóa tất cả
                </button>
              </div>
              <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Ảnh</th>
                      <th>Tên</th>
                      <th>Loại</th>
                      <th>Giá</th>
                      <th>Hành động</th>
                    </tr>
                  </thead>
                  <tbody id="adminProductList">
                    <!-- JS render -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/admin-products.js"></script>
  </body>
</html>
